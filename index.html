<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi taller de aprendizaje</title>
<style>
  :root{
    --ink:#1b2233; --soft:#5d6478; --faint:#8b91a3; --line:#e4e6ef;
    --bg:#fbfaf9; --card:#ffffff;
    --shadow:0 1px 3px rgba(24,28,55,.07), 0 8px 24px rgba(24,28,55,.06);
    --shadow-hover:0 2px 6px rgba(24,28,55,.10), 0 16px 40px rgba(24,28,55,.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px; margin:0 auto; padding:56px 22px 80px}
  a{color:inherit}

  /* ---- Header ---- */
  header.top{margin-bottom:34px}
  .kicker{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:700}
  h1.title{font-family:Georgia,"Times New Roman",serif; font-size:38px; line-height:1.15; margin:.28em 0 .1em; letter-spacing:-.01em}
  .lede{font-size:18px; color:var(--soft); margin:0}
  .meta{margin-top:14px; font-size:14px; color:var(--faint)}
  .meta b{color:var(--soft); font-weight:700}

  /* ---- Topic grid ---- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-top:8px}
  .card{
    position:relative; text-align:left; cursor:pointer; background:var(--card);
    border:1px solid var(--line); border-radius:18px; padding:24px 22px 20px;
    box-shadow:var(--shadow); transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    overflow:hidden; font:inherit; color:inherit; width:100%; display:block;
  }
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--tc-accent)}
  .card:hover{transform:translateY(-3px); box-shadow:var(--shadow-hover); border-color:var(--tc-accent)}
  .card:focus-visible{outline:3px solid var(--tc-accent); outline-offset:2px}
  .card .emoji{font-size:30px; line-height:1; display:block; margin-bottom:12px}
  .card h2{font-size:21px; margin:0 0 6px; letter-spacing:-.01em}
  .card p{margin:0; color:var(--soft); font-size:15px}
  .card .foot{display:flex; align-items:center; justify-content:space-between; margin-top:18px}
  .pill{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    color:var(--tc-accent); background:var(--tc-soft); border:1px solid var(--tc-line);
    padding:4px 11px; border-radius:999px;
  }
  .go{font-size:14px; font-weight:700; color:var(--tc-accent)}

  /* ---- Topic detail ---- */
  .back{
    display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:600;
    color:var(--soft); text-decoration:none; margin-bottom:22px; padding:6px 12px 6px 8px;
    border:1px solid var(--line); border-radius:999px; background:var(--card); transition:.14s;
  }
  .back:hover{color:var(--ink); border-color:var(--faint)}
  .hero{display:flex; gap:16px; align-items:flex-start; padding-bottom:22px; margin-bottom:6px; border-bottom:1px solid var(--line)}
  .hero .emoji{font-size:40px; line-height:1}
  .hero h2{font-family:Georgia,"Times New Roman",serif; font-size:30px; margin:0 0 6px; letter-spacing:-.01em}
  .hero p{margin:0; color:var(--soft); font-size:17px; max-width:60ch}

  .section-label{font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:700; margin:26px 0 12px}
  .lessonlist{display:flex; flex-direction:column; gap:10px}
  .lessonrow{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 18px;
    box-shadow:var(--shadow); transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .lessonrow:hover{transform:translateX(3px); border-color:var(--tc-accent); box-shadow:var(--shadow-hover)}
  .lessonrow .num{
    flex:none; width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
    font-weight:800; font-size:15px; color:var(--tc-accent); background:var(--tc-soft); border:1px solid var(--tc-line);
  }
  .lessonrow .ltitle{font-weight:600; font-size:16px; flex:1}
  .lessonrow .arrow{color:var(--faint); font-size:18px}
  .empty{color:var(--soft); font-size:15px; background:var(--card); border:1px dashed var(--line); border-radius:14px; padding:18px 20px}

  .matlinks{display:flex; flex-wrap:wrap; gap:10px}
  .matlink{
    display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:600; text-decoration:none;
    color:var(--soft); background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 13px; transition:.14s;
  }
  .matlink:hover{color:var(--ink); border-color:var(--tc-accent); background:var(--tc-soft)}
  .matlink .ic{color:var(--tc-accent); font-weight:800}

  footer.foot-note{margin-top:52px; padding-top:20px; border-top:1px solid var(--line); font-size:14px; color:var(--faint)}
  footer.foot-note code{background:#eef0f5; padding:2px 7px; border-radius:6px; font-size:13px; color:var(--soft)}

  .hidden{display:none !important}
  @media (max-width:520px){
    .wrap{padding:40px 16px 60px}
    h1.title{font-size:30px}
    .hero{flex-direction:column; gap:10px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ VISTA: HOME (temas) ============ -->
  <section id="home">
    <header class="top">
      <div class="kicker">Taller de aprendizaje</div>
      <h1 class="title">¿Qué querés estudiar hoy?</h1>
      <p class="lede">Elegí un tema para ver sus lecciones.</p>
      <div class="meta" id="home-meta"></div>
    </header>
    <div class="grid" id="grid"></div>
  </section>

  <!-- ============ VISTA: TEMA (lecciones) ============ -->
  <section id="topic" class="hidden">
    <a class="back" href="#">← Todos los temas</a>
    <div class="hero">
      <div class="emoji" id="t-emoji"></div>
      <div>
        <h2 id="t-title"></h2>
        <p id="t-subtitle"></p>
      </div>
    </div>

    <div class="section-label">Lecciones</div>
    <div class="lessonlist" id="t-lessons"></div>

    <div class="section-label">Material del tema</div>
    <div class="matlinks" id="t-material"></div>
  </section>

  <footer class="foot-note">
    Creado con el skill <code>/teach</code>. Para agregar un tema o una lección, pedíselo al agente
    — mantiene esta página y las carpetas de cada tema.
  </footer>
</div>

<script>
/* ===========================================================================
   REGISTRO DE TEMAS — fuente de verdad de la home.
   El skill /teach mantiene este array: al crear/borrar una lección o un tema,
   se actualiza acá. Cada tema es una carpeta autocontenida en topics/<slug>/.
   =========================================================================== */
const TOPICS = [
  {
    slug: "tenis-lesiones",
    emoji: "🏋️",
    title: "Preparación física / lesiones",
    subtitle: "Jugar y competir sin lesionarme: fuerza y prevención fuera de cancha.",
    accent: "#0b7a5a", accentSoft: "#e7f4ee", accentLine: "#c3e4d6",
    dir: "topics/tenis-lesiones",
    lessons: [
      { n: 1, file: "lessons/0001-mapa-lesiones-y-eslabon-debil.html", title: "El mapa de lesiones del tenista (y tu eslabón débil)" },
      { n: 2, file: "lessons/0002-fuga-cadena-saque.html", title: "Por qué el saque te castiga el brazo (y cómo cortar la fuga)" },
      { n: 3, file: "lessons/0003-base-tren-inferior.html", title: "Tu base de tren inferior: el eslabón que protege todo" }
    ],
    refs: [
      { file: "reference/autoevaluacion-fisica-tenis.html", title: "Autoevaluación física" }
    ]
  },
  {
    slug: "tenis-tactica",
    emoji: "🧠",
    title: "Táctica de partido",
    subtitle: "Ver el partido como estructura, entrar con un plan y ganar con la cabeza.",
    accent: "#3a45b0", accentSoft: "#eef0fb", accentLine: "#d6daf1",
    dir: "topics/tenis-tactica",
    lessons: [
      { n: 1, file: "lessons/0001-subir-de-altitud.html", title: "Subí de altitud: el partido es una estructura, no una fila de pelotas" }
    ],
    refs: []
  }
];

/* --------------------------------------------------------------------------- */
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const bySlug = (slug) => TOPICS.find(t => t.slug === slug);
const setAccent = (el, t) => {
  el.style.setProperty("--tc-accent", t.accent);
  el.style.setProperty("--tc-soft", t.accentSoft);
  el.style.setProperty("--tc-line", t.accentLine);
};

function renderHome() {
  const nT = TOPICS.length;
  const nL = TOPICS.reduce((a, t) => a + t.lessons.length, 0);
  $("home-meta").innerHTML = `<b>${nT}</b> ${nT === 1 ? "tema" : "temas"} · <b>${nL}</b> ${nL === 1 ? "lección" : "lecciones"} en total`;

  const grid = $("grid");
  grid.innerHTML = "";
  TOPICS.forEach(t => {
    const nL = t.lessons.length;
    const card = document.createElement("button");
    card.className = "card";
    card.type = "button";
    setAccent(card, t);
    card.setAttribute("aria-label", `${t.title} — ${nL} ${nL === 1 ? "lección" : "lecciones"}`);
    card.innerHTML = `
      <span class="emoji">${t.emoji}</span>
      <h2>${esc(t.title)}</h2>
      <p>${esc(t.subtitle)}</p>
      <div class="foot">
        <span class="pill">${nL} ${nL === 1 ? "lección" : "lecciones"}</span>
        <span class="go">Ver lecciones →</span>
      </div>`;
    card.addEventListener("click", () => { location.hash = t.slug; });
    grid.appendChild(card);
  });
}

function renderTopic(t) {
  const sec = $("topic");
  setAccent(sec, t);
  $("t-emoji").textContent = t.emoji;
  $("t-title").textContent = t.title;
  $("t-subtitle").textContent = t.subtitle;

  const list = $("t-lessons");
  list.innerHTML = "";
  if (t.lessons.length === 0) {
    list.innerHTML = `<div class="empty">Todavía no hay lecciones en este tema. Pedile una al agente con <b>/teach</b>.</div>`;
  } else {
    t.lessons.forEach(l => {
      const a = document.createElement("a");
      a.className = "lessonrow";
      a.href = `${t.dir}/${l.file}`;
      a.innerHTML = `
        <span class="num">${l.n}</span>
        <span class="ltitle">${esc(l.title)}</span>
        <span class="arrow">→</span>`;
      list.appendChild(a);
    });
  }

  const mat = $("t-material");
  const items = [
    { ic: "◎", label: "Misión", href: `${t.dir}/MISSION.md` },
    { ic: "◆", label: "Recursos", href: `${t.dir}/RESOURCES.md` },
    { ic: "▤", label: "Glosario", href: `${t.dir}/GLOSSARY.md` },
    ...(t.refs || []).map(r => ({ ic: "❐", label: r.title, href: `${t.dir}/${r.file}` }))
  ];
  mat.innerHTML = items.map(i =>
    `<a class="matlink" href="${i.href}"><span class="ic">${i.ic}</span>${esc(i.label)}</a>`
  ).join("");
}

function route() {
  const slug = decodeURIComponent((location.hash || "").replace(/^#/, "")).trim();
  const t = slug ? bySlug(slug) : null;
  if (t) {
    $("home").classList.add("hidden");
    $("topic").classList.remove("hidden");
    renderTopic(t);
    window.scrollTo(0, 0);
  } else {
    $("topic").classList.add("hidden");
    $("home").classList.remove("hidden");
  }
}

renderHome();
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
